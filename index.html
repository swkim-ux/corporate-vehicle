<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>법인차량 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#F2F2F7;color:#1C1C1E;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
button{cursor:pointer;user-select:none;font-family:inherit}
button:active{opacity:.65}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:calc(62px + env(safe-area-inset-bottom,0px))}

/* ── Bottom Nav ─────────────────────────── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(249,249,249,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid rgba(0,0,0,.12);display:flex;z-index:500;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;background:none;border:none;cursor:pointer;padding:7px 0 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:54px;user-select:none;position:relative}
.nb .ic{font-size:23px;line-height:1;display:block;transition:transform .15s}
.nb .lb{font-size:10px;color:#8E8E93;font-weight:400;line-height:1.2;letter-spacing:-.2px}
.nb.on .lb{color:#007AFF;font-weight:600}
.nb.on .ic{transform:scale(1.08)}
.nb-badge{position:absolute;top:6px;right:calc(50% - 18px);background:#FF3B30;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;line-height:14px}

/* ── Section Header ─────────────────────── */
.sh{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 10px}
.sh h2{font-size:22px;font-weight:700;color:#1C1C1E}
.ab{border:none;border-radius:22px;padding:9px 20px;font-size:14px;font-weight:600;color:#fff;min-height:38px;white-space:nowrap;letter-spacing:-.2px}

/* ── Content ────────────────────────────── */
.ct{padding:0 16px}

/* ── Cards ──────────────────────────────── */
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.cf{display:flex;justify-content:flex-end;align-items:center;margin-top:10px;padding-top:10px;border-top:.5px solid #F2F2F7;gap:8px}
.btn-del{font-size:13px;color:#FF3B30;background:#FF3B3010;border:none;padding:7px 14px;border-radius:9px;min-height:34px;font-weight:500}
.btn-act{font-size:13px;color:#fff;border:none;border-radius:9px;padding:8px 16px;min-height:34px;font-weight:600}

/* ── Typography / Badges ────────────────── */
.bdg{border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600;white-space:nowrap}
.rw{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.ct2{font-size:15px;font-weight:600;color:#1C1C1E;margin-bottom:3px;line-height:1.3}
.cs{font-size:13px;color:#6C6C70;line-height:1.7}

/* ── Thumbnails ─────────────────────────── */
.th{width:70px;height:54px;object-fit:cover;border-radius:10px;flex-shrink:0;cursor:pointer}
.pt{width:70px;height:54px;border-radius:10px;background:#F2F2F7;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}

/* ── Empty States ───────────────────────── */
.emp{text-align:center;padding:4rem 1rem;color:#C7C7CC}
.emp .ei{font-size:52px;margin-bottom:14px}
.emp .em{font-size:15px;color:#8E8E93;font-weight:500}
.emp .ems{font-size:13px;color:#C7C7CC;margin-top:5px}
.emp .emp-btn{margin-top:18px;padding:12px 28px;border:none;border-radius:22px;font-size:15px;font-weight:600;color:#fff;cursor:pointer}

/* ── Bottom Sheet ───────────────────────── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;flex-direction:column;justify-content:flex-end}
.sl{background:#fff;border-radius:20px 20px 0 0;max-height:93vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));will-change:transform;transition:transform .25s ease}
.slh{display:flex;justify-content:center;padding:10px 0 0;touch-action:none}
.hb{width:40px;height:4px;border-radius:2px;background:#D1D1D6}
.slhd{display:flex;justify-content:space-between;align-items:center;padding:10px 20px 14px}
.slhd h2{font-size:18px;font-weight:700}
.xb{background:#F2F2F7;border:none;font-size:16px;cursor:pointer;color:#3C3C43;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slb{padding:0 20px}

/* ── Forms ──────────────────────────────── */
.fld{margin-bottom:16px}
.fld label{font-size:13px;color:#6C6C70;display:block;margin-bottom:7px;font-weight:500;letter-spacing:-.1px}
.fld input,.fld select{width:100%;font-size:16px;padding:12px 14px;border:1.5px solid #E5E5EA;border-radius:11px;background:#fff;color:#1C1C1E;-webkit-appearance:none;appearance:none;outline:none}
.fld input:focus,.fld select:focus{border-color:#007AFF}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pb{border:1.5px dashed #D1D1D6;border-radius:12px;min-height:82px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;cursor:pointer;background:#FAFAFA;padding:10px}
.pb img{max-height:110px;max-width:100%;border-radius:8px;object-fit:contain}
.svb{width:100%;padding:16px;border-radius:14px;color:#fff;border:none;cursor:pointer;font-size:17px;font-weight:600;margin-top:8px;letter-spacing:-.2px}

/* ── Stats Grid ─────────────────────────── */
.sgd{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 16px}
.sc{background:#fff;border-radius:14px;padding:14px 16px}
.sl2{font-size:12px;color:#8E8E93;margin-bottom:6px;font-weight:500}
.sv{font-size:22px;font-weight:700}

/* ── Vehicle Row ─────────────────────────  */
.vc{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.vi{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

/* ── Spinner ─────────────────────────────  */
.spw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
.sp{width:36px;height:36px;border:3px solid #E5E5EA;border-top-color:#007AFF;border-radius:50%;animation:spin .8s linear infinite}

/* ── Alerts / Banners ────────────────────  */
.alb{background:#FFFBEB;border:1px solid #FDE68A;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.inuse-card{background:#FFF1F0;border:1.5px solid #FFCDD2;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}

/* ── Sub-tabs (records) ──────────────────  */
.subtabs{display:flex;gap:0;background:#F2F2F7;border-radius:11px;padding:3px;margin-bottom:14px}
.subtab{flex:1;padding:8px 0;border:none;background:transparent;border-radius:9px;font-size:14px;font-weight:500;color:#8E8E93;cursor:pointer;transition:all .15s}
.subtab.on{background:#fff;color:#1C1C1E;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ── Report ──────────────────────────────  */
.rsc{background:#fff;border-radius:14px;padding:14px 16px}
.rsl{font-size:12px;color:#8E8E93;margin-bottom:4px;font-weight:500}
.rsv{font-size:20px;font-weight:700}
.tsg{display:flex;gap:6px;flex-wrap:wrap}
.tsg button{padding:8px 18px;border-radius:20px;font-size:13px;border:1.5px solid #E5E5EA;background:#fff;cursor:pointer;color:#6C6C70;font-weight:500}
.tsg button.on{background:#007AFF;color:#fff;border-color:#007AFF;font-weight:600}

/* ── More Tab ────────────────────────────  */
.more-item{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;border:none;width:100%;text-align:left}
.more-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

/* ── Misc ────────────────────────────────  */
.ibox{background:#F2F2F7;border-radius:12px;padding:14px;margin-bottom:14px;font-size:13px;color:#6C6C70;line-height:1.7}
.info-banner{background:#EEF4FF;border-radius:11px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#1D4ED8}
.imgview{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.imgview img{max-width:100%;max-height:85vh;border-radius:10px;object-fit:contain}
.ivcls{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;border-radius:50%;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ivlb{color:rgba(255,255,255,.55);font-size:13px;margin-top:14px;text-align:center}
.sect-lb{font-size:13px;color:#8E8E93;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:0 16px;margin:18px 0 8px}

/* ── Quick Actions (home) ────────────────  */
.qa-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:6px}
.qa-btn{border:none;border-radius:14px;padding:16px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;font-weight:600;color:#fff;min-height:56px}
.qa-btn .qa-ic{font-size:24px;flex-shrink:0}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

var FBC = {
  apiKey: "AIzaSyCPvMbFfXHUgkYfJ3ZRcp5ypATRo8xLOAo",
  authDomain: "corporate-vehicle.firebaseapp.com",
  projectId: "corporate-vehicle",
  storageBucket: "corporate-vehicle.firebasestorage.app",
  messagingSenderId: "419510195247",
  appId: "1:419510195247:web:602f11bb4696102b1ca2da"
};
var fb = getApps().length ? getApps()[0] : initializeApp(FBC);
var db = getFirestore(fb);

async function fsGet(col) {
  var q = query(collection(db, col), orderBy("createdAt", "desc"));
  var snap = await getDocs(q);
  return snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
}
async function fsAdd(col, data) {
  var r = await addDoc(collection(db, col), Object.assign({}, data, { createdAt: Date.now() }));
  return r.id;
}
async function fsDel(col, id) { await deleteDoc(doc(db, col, id)); }
async function fsUpd(col, id, data) { await updateDoc(doc(db, col, id), data); }

function toDU(f) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function(ev) { res(ev.target.result); };
    r.onerror = rej;
    r.readAsDataURL(f);
  });
}
function today() { return new Date().toISOString().slice(0, 10); }
function nowLocal() {
  var d = new Date();
  var p = function(n) { return String(n).padStart(2, "0"); };
  return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) + "T" + p(d.getHours()) + ":" + p(d.getMinutes());
}
function firstDay() { var d = new Date(); d.setDate(1); return d.toISOString().slice(0, 10); }
function maxResv() { var d = new Date(); d.setDate(d.getDate() + 7); return d.toISOString().slice(0, 10); }
function nf(n) { return Number(n).toLocaleString(); }
function df(s) { return s ? s.replace("T", " ") : ""; }
function gv(id) { var el = document.getElementById(id); return el ? el.value : ""; }
function mkPhone(p) {
  if (!p) return "";
  return " · <a href='tel:" + p + "' style='color:#007AFF;text-decoration:none'>📞 " + p + "</a>";
}

var C = { drive: "#007AFF", maint: "#FF9500", fuel: "#FF3B30", veh: "#34C759", resv: "#5856D6" };

var ADMIN_PW = "1006";
var CY = String(new Date().getFullYear());
var CM = String(new Date().getMonth() + 1).padStart(2, "0");

var S = {
  tab: "home", sheet: null, sheetId: null, resvData: null,
  vehicles: [], drives: [], maints: [], fuels: [], reservations: [],
  loading: true, error: null,
  recordsTab: "maint",
  rVid: "all", rFrom: firstDay(), rTo: today(), rTab: "drive",
  rMode: "range",   // "range" | "year" | "month"
  rYear: CY, rMonth: CM
};

var PDU = null;
function veh(id) { return S.vehicles.find(function(v) { return v.id === id; }); }
function set(p) { S = Object.assign({}, S, p); render(); }

/* ── RENDER ───────────────────────────── */
function render() {
  var app = document.getElementById("app");
  if (S.loading) {
    app.innerHTML = '<div class="spw"><div class="sp"></div><div style="font-size:14px;color:#8E8E93">불러오는 중...</div></div>';
    return;
  }
  if (S.error) {
    app.innerHTML = '<div style="padding:3rem 1.5rem;text-align:center">'
      + '<div style="font-size:48px;margin-bottom:16px">⚠️</div>'
      + '<div style="font-size:17px;font-weight:600;margin-bottom:8px">연결 실패</div>'
      + '<div style="font-size:14px;color:#8E8E93;margin-bottom:20px">' + S.error + '</div>'
      + '<button id="retryBtn" style="padding:13px 28px;border-radius:14px;background:#007AFF;color:#fff;border:none;font-size:16px;font-weight:600">다시 시도</button></div>';
    document.getElementById("retryBtn").onclick = loadData;
    return;
  }

  var TABS = [
    { id: "home",    ic: "🏠", lb: "홈" },
    { id: "resv",    ic: "📅", lb: "예약" },
    { id: "drive",   ic: "🚗", lb: "주행" },
    { id: "records", ic: "📋", lb: "기록" },
    { id: "more",    ic: "···", lb: "더보기" }
  ];
  // highlight "더보기" when on report/veh sub-pages
  var activeTab = (S.tab === "report" || S.tab === "veh") ? "more" : S.tab;

  // badge: running vehicles count on drive tab
  var running = S.drives.filter(function(d) { return !d.arriveTime; }).length;

  var html = "";
  if (S.tab === "home")    html = rHome();
  else if (S.tab === "resv")    html = rResv();
  else if (S.tab === "drive")   html = rDrives();
  else if (S.tab === "records") html = rRecords();
  else if (S.tab === "more")    html = rMore();
  else if (S.tab === "report")  html = rReport();
  else if (S.tab === "veh")     html = rVehs();

  var nav = '<nav class="bnav">'
    + TABS.map(function(t) {
        var badge = (t.id === "drive" && running > 0)
          ? '<span class="nb-badge">' + running + '</span>' : "";
        return '<button class="nb' + (activeTab === t.id ? " on" : "") + '" data-tab="' + t.id + '">'
          + badge
          + '<span class="ic">' + t.ic + '</span>'
          + '<span class="lb">' + t.lb + '</span></button>';
      }).join("")
    + '</nav>';

  var titles = {
    resv: "차량 예약", drive: "출발 등록", arrive: "복귀 입력",
    maint: "정비 기록 추가", fuel: "주유 기록 추가", veh: "차량 등록"
  };
  var sheetHtml = "";
  if (S.sheet) {
    sheetHtml = '<div class="ov" id="ov">'
      + '<div class="sl" id="sl">'
      + '<div class="slh" id="dragHandle"><div class="hb"></div></div>'
      + '<div class="slhd"><h2>' + (titles[S.sheet] || "") + '</h2>'
      + '<button class="xb" id="xb">✕</button></div>'
      + '<div class="slb">' + bSheet() + '</div></div></div>';
  }

  app.innerHTML = html + nav + sheetHtml;
  bind();
  if (S.sheet) bindSheetSwipe();
}

/* ── OIL ALERTS ──────────────────────── */
function rOilAlerts() {
  var alerts = [];
  for (var i = 0; i < S.vehicles.length; i++) {
    var v = S.vehicles[i];
    var ors = S.maints
      .filter(function(m) { return m.vehicleId === v.id && m.type && m.type.includes("엔진오일"); })
      .sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
    if (!ors.length) continue;
    var last = ors[0];
    var md = (new Date().getFullYear() - new Date(last.date).getFullYear()) * 12
      + (new Date().getMonth() - new Date(last.date).getMonth());
    var drvs = S.drives.filter(function(d) { return d.vehicleId === v.id && d.odometer; })
      .sort(function(a, b) { return b.createdAt - a.createdAt; });
    var ks = (last.odometer && drvs[0] && drvs[0].odometer)
      ? Number(drvs[0].odometer) - Number(last.odometer) : null;
    if (md < 6 && (ks === null || ks < 10000)) continue;
    var rs = [];
    if (md >= 6) rs.push(md + "개월 경과");
    if (ks !== null && ks >= 10000) rs.push(nf(ks) + "km 주행");
    alerts.push({ name: v.name, plate: v.plate, reason: rs.join(" · "), date: last.date });
  }
  if (!alerts.length) return "";
  return '<div style="padding:0 16px 4px">'
    + alerts.map(function(a) {
        return '<div class="alb">'
          + '<div style="font-size:24px;flex-shrink:0">🔔</div>'
          + '<div><div style="font-size:13px;font-weight:600;color:#92400E">엔진오일 교체 필요 · ' + a.name + '</div>'
          + '<div style="font-size:12px;color:#92400E;margin-top:2px">' + a.reason + '</div>'
          + '<div style="font-size:11px;color:#B45309;margin-top:2px">마지막 교체 ' + a.date + '</div></div></div>';
      }).join("")
    + '</div>';
}

/* ── HOME ────────────────────────────── */
function rHome() {
  var running = S.drives.filter(function(d) { return !d.arriveTime; });
  var todayStr = today();
  var resToday = S.reservations
    .filter(function(r) { return r.startTime && r.startTime.slice(0, 10) === todayStr; })
    .sort(function(a, b) { return a.startTime.localeCompare(b.startTime); });
  var tm = S.maints.reduce(function(s, m) { return s + (Number(m.cost) || 0); }, 0);
  var tf = S.fuels.reduce(function(s, f) { return s + (Number(f.amount) || 0); }, 0);

  // Running vehicles banner
  var runningHtml = running.length > 0
    ? '<div style="padding:0 16px 4px">'
      + running.map(function(d) {
          var v = veh(d.vehicleId);
          return '<div class="inuse-card">'
            + '<div>'
            + '<div style="font-size:12px;color:#E53E3E;font-weight:600;margin-bottom:2px">🔴 운행 중</div>'
            + '<div style="font-weight:600;font-size:15px">' + (v ? v.name : "-") + (d.driver ? " · " + d.driver : "") + '</div>'
            + '<div style="font-size:13px;color:#6C6C70;margin-top:1px">' + d.from + ' → ' + d.to + '</div>'
            + '<div style="font-size:12px;color:#9CA3AF;margin-top:1px">출발 ' + df(d.departTime) + '</div>'
            + '</div>'
            + '<button data-arrive="' + d.id + '" style="background:#FF3B30;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0">복귀<br>입력</button>'
            + '</div>';
        }).join("")
      + '</div>'
    : "";

  // Quick actions
  var qaHtml = '<div class="qa-row">'
    + '<button class="qa-btn" data-sheet="drive" style="background:' + C.drive + '">'
    + '<span class="qa-ic">🚗</span><div style="text-align:left"><div style="font-size:13px;opacity:.85;font-weight:400">출발</div><div>등록</div></div></button>'
    + '<button class="qa-btn" data-sheet="resv" style="background:' + C.resv + '">'
    + '<span class="qa-ic">📅</span><div style="text-align:left"><div style="font-size:13px;opacity:.85;font-weight:400">차량</div><div>예약</div></div></button>'
    + '</div>'
    + '<div class="qa-row">'
    + '<button class="qa-btn" data-sheet="fuel" style="background:' + C.fuel + '">'
    + '<span class="qa-ic">⛽</span><div style="text-align:left"><div style="font-size:13px;opacity:.85;font-weight:400">주유</div><div>기록</div></div></button>'
    + '<button class="qa-btn" data-sheet="maint" style="background:' + C.maint + '">'
    + '<span class="qa-ic">🔧</span><div style="text-align:left"><div style="font-size:13px;opacity:.85;font-weight:400">정비</div><div>기록</div></div></button>'
    + '</div>';

  // Vehicle status
  var vehCards = S.vehicles.length === 0
    ? '<div style="font-size:14px;color:#C7C7CC;text-align:center;padding:16px">등록된 차량이 없습니다</div>'
    : S.vehicles.map(function(v) {
        var out = S.drives.find(function(d) { return d.vehicleId === v.id && !d.arriveTime; });
        return '<div class="vc">'
          + '<div class="vi" style="background:' + (v.color || C.drive) + '22">🚗</div>'
          + '<div style="flex:1;min-width:0">'
          + '<div style="font-weight:600;font-size:15px">' + v.name + '</div>'
          + '<div style="font-size:13px;color:#8E8E93">' + v.plate + (v.dept ? " · " + v.dept : "") + '</div>'
          + '</div>'
          + '<div style="text-align:right">'
          + '<div style="display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:' + (out ? "#FF3B3018" : "#34C75918") + ';color:' + (out ? "#FF3B30" : "#34C759") + '">' + (out ? "운행 중" : "재차 중") + '</div>'
          + '</div></div>';
      }).join("");

  // Today reservations
  var todayResvHtml = resToday.length > 0
    ? '<div class="sect-lb">오늘 예약</div>'
      + '<div style="padding:0 16px">'
      + resToday.map(function(r) {
          var v = veh(r.vehicleId);
          return '<div style="background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px">'
            + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
            + '<span style="font-size:14px;font-weight:600;color:' + C.resv + '">' + (v ? v.name : "-") + '</span>'
            + '<span style="font-size:13px;color:#8E8E93">' + df(r.startTime).slice(11, 16) + ' ~ ' + df(r.endTime).slice(11, 16) + '</span></div>'
            + '<div style="font-size:14px;color:#1C1C1E">' + (r.from || "") + ' → ' + (r.to || "") + '</div>'
            + '<div style="font-size:13px;color:#8E8E93;margin-top:2px">' + r.name + mkPhone(r.phone) + (r.purpose ? " · " + r.purpose : "") + '</div>'
            + '</div>';
        }).join("")
      + '</div>'
    : "";

  return '<div style="padding:20px 16px 12px;background:#F2F2F7">'
      + '<div style="font-size:24px;font-weight:700">법인차량 관리</div>'
      + '<div style="font-size:14px;color:#8E8E93;margin-top:3px">'
      + new Date().toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "short" }) + '</div>'
      + '</div>'
    + runningHtml
    + rOilAlerts()
    + '<div class="sgd">'
    + '<div class="sc"><div class="sl2">등록 차량</div><div class="sv" style="color:' + C.veh + '">' + S.vehicles.length + '<span style="font-size:14px;font-weight:500">대</span></div></div>'
    + '<div class="sc"><div class="sl2">주행 기록</div><div class="sv" style="color:' + C.drive + '">' + S.drives.length + '<span style="font-size:14px;font-weight:500">건</span></div></div>'
    + '<div class="sc"><div class="sl2">정비 비용</div><div class="sv" style="color:' + C.maint + ';font-size:18px">' + nf(tm) + '<span style="font-size:12px;font-weight:500">원</span></div></div>'
    + '<div class="sc"><div class="sl2">주유 금액</div><div class="sv" style="color:' + C.fuel + ';font-size:18px">' + nf(tf) + '<span style="font-size:12px;font-weight:500">원</span></div></div>'
    + '</div>'
    + '<div class="sect-lb">빠른 등록</div>'
    + qaHtml
    + '<div class="sect-lb">차량 현황</div>'
    + '<div style="padding:0 16px">' + vehCards + '</div>'
    + todayResvHtml;
}

/* ── RESERVATIONS ────────────────────── */
function rResv() {
  var now = new Date();
  var upcoming = S.reservations
    .filter(function(r) { return new Date(r.endTime) >= now; })
    .sort(function(a, b) { return a.startTime.localeCompare(b.startTime); });
  var past = S.reservations
    .filter(function(r) { return new Date(r.endTime) < now; })
    .sort(function(a, b) { return b.startTime.localeCompare(a.startTime); }).slice(0, 5);

  var upHtml = upcoming.length === 0
    ? '<div class="emp"><div class="ei">📅</div><div class="em">예약 내역이 없습니다</div><div class="ems">차량을 예약하면 여기에 표시됩니다</div>'
      + '<button class="emp-btn" style="background:' + C.resv + '" data-sheet="resv">+ 예약하기</button></div>'
    : upcoming.map(function(r) {
        var v = veh(r.vehicleId);
        var isNow = new Date(r.startTime) <= now && new Date(r.endTime) >= now;
        var badge = isNow
          ? '<span class="bdg" style="background:#FF3B3018;color:#FF3B30">🔴 사용 중</span>'
          : '<span class="bdg" style="background:' + C.resv + '18;color:' + C.resv + '">📅 예약</span>';
        return '<div class="card">'
          + '<div class="rw"><span class="bdg" style="background:' + C.resv + '18;color:' + C.resv + '">' + (v ? v.name : "-") + '</span>'
          + '<span style="font-size:12px;color:#8E8E93">' + (v ? v.plate : "") + '</span>' + badge
          + (r.password ? '<span style="font-size:11px;color:#8E8E93">🔒 패스워드</span>' : '') + '</div>'
          + '<div class="ct2">' + (r.from || "") + ' → ' + (r.to || "") + '</div>'
          + '<div class="cs">' + r.name + mkPhone(r.phone) + '</div>'
          + '<div class="cs">' + df(r.startTime) + ' ~ ' + df(r.endTime).slice(11, 16) + (r.purpose ? " · " + r.purpose : "") + '</div>'
          + '<div class="cf">'
          + '<button class="btn-act" data-resv-start="' + r.id + '" style="background:' + C.drive + '">출발 등록</button>'
          + '<button class="btn-del" data-del="reservations" data-id="' + r.id + '">🔒 삭제</button></div></div>';
      }).join("");

  var pastHtml = past.length > 0
    ? '<div class="sect-lb" style="margin-top:8px">지난 예약</div>'
      + past.map(function(r) {
          var v = veh(r.vehicleId);
          return '<div class="card" style="opacity:.5">'
            + '<div class="rw"><span class="bdg" style="background:#8888881a;color:#888">' + (v ? v.name : "-") + '</span>'
            + '<span style="font-size:11px;color:#aaa">완료</span></div>'
            + '<div class="ct2" style="color:#888">' + (r.from || "") + ' → ' + (r.to || "") + '</div>'
            + '<div class="cs">' + r.name + mkPhone(r.phone) + ' · ' + df(r.startTime) + ' ~ ' + df(r.endTime).slice(11, 16) + '</div>'
            + '<div class="cf"><button class="btn-del" data-del="reservations" data-id="' + r.id + '">삭제</button></div></div>';
        }).join("")
    : "";

  return '<div class="sh"><h2>차량 예약</h2>'
    + '<button class="ab" style="background:' + C.resv + '" data-sheet="resv">+ 예약</button></div>'
    + '<div class="ct">' + upHtml + pastHtml + '</div>';
}

/* ── DRIVES ──────────────────────────── */
function rDrives() {
  var running = S.drives.filter(function(d) { return !d.arriveTime; });
  var done = S.drives.filter(function(d) { return !!d.arriveTime; });

  function driveCard(d, isRunning) {
    var v = veh(d.vehicleId);
    var rk = (d.odometer && d.odoStart) ? Number(d.odometer) - Number(d.odoStart) : null;
    var photo = d.photo ? '<img class="th" src="' + d.photo + '" data-src="' + d.photo + '" data-label="계기판 · ' + (v ? v.name : "") + '" data-viewer="1"/>' : "";
    var sub = (v ? v.plate : "") + (d.driver ? " · " + d.driver + (d.driverPhone ? mkPhone(d.driverPhone) : "") : "")
      + (d.departTime ? "<br>출발 " + df(d.departTime) : "")
      + (d.arriveTime ? " · 도착 " + df(d.arriveTime) : "")
      + (d.odoStart ? "<br>" + nf(d.odoStart) + "km" : "")
      + (d.odometer ? " → " + nf(d.odometer) + "km" : "")
      + (rk !== null ? " · <strong>" + nf(rk) + "km</strong>" : "");
    return '<div class="card' + (isRunning ? '" style="border:1.5px solid #FFCDD2' : "") + '">'
      + '<div style="display:flex;gap:10px">' + photo
      + '<div style="flex:1;min-width:0">'
      + '<div class="rw">'
      + '<span class="bdg" style="background:' + C.drive + '18;color:' + C.drive + '">' + (v ? v.name : "-") + '</span>'
      + (isRunning
          ? '<span class="bdg" style="background:#FF3B3018;color:#FF3B30">🔴 운행 중</span>'
          : '<span class="bdg" style="background:#34C75918;color:#34C759">🟢 복귀</span>')
      + '</div>'
      + '<div class="ct2">' + d.from + ' → ' + d.to + '</div>'
      + '<div class="cs">' + sub + '</div>'
      + (d.purpose ? '<div style="font-size:12px;color:#C7C7CC;margin-top:2px">' + d.purpose + '</div>' : "")
      + (d.odoStartModified === "Y" ? '<div style="font-size:11px;color:#FF9500;margin-top:3px">⚠️ 출발 거리 수동 수정됨</div>' : "")
      + '</div></div>'
      + '<div class="cf">'
      + (isRunning ? '<button class="btn-act" data-arrive="' + d.id + '" style="background:#FF3B30;font-size:14px;padding:9px 20px">복귀 입력</button>' : "")
      + '<button class="btn-del" data-del="drives" data-id="' + d.id + '">삭제</button></div></div>';
  }

  var runningHtml = running.length > 0
    ? '<div class="sect-lb">운행 중</div>' + running.map(function(d) { return driveCard(d, true); }).join("")
    : "";
  var doneHtml = done.length > 0
    ? '<div class="sect-lb">완료된 주행</div>' + done.map(function(d) { return driveCard(d, false); }).join("")
    : "";

  var emptyHtml = S.drives.length === 0
    ? '<div class="emp"><div class="ei">🚗</div><div class="em">주행 기록이 없습니다</div><div class="ems">출발 등록을 하면 여기에 표시됩니다</div>'
      + '<button class="emp-btn" style="background:' + C.drive + '" data-sheet="drive">+ 출발 등록</button></div>'
    : "";

  return '<div class="sh"><h2>주행 기록</h2>'
    + '<button class="ab" style="background:' + C.drive + '" data-sheet="drive">+ 출발</button></div>'
    + '<div class="ct">' + emptyHtml + runningHtml + doneHtml + '</div>';
}

          : "";

          + '<div style="flex:1;min-width:0">'
          + '<div class="rw"><span class="bdg" style="background:' + C.maint + '18;color:' + C.maint + '">' + (v ? v.name : "-") + '</span>'
          + '<span style="font-size:12px;color:#8E8E93">' + df(mDt) + '</span></div>'
          + '<div class="ct2">' + m.type + '</div>'
          + '<div class="cs">'
          + (m.shop ? m.shop : "") + (m.cost ? " · " + nf(m.cost) + "원" : "") + (m.odometer ? " · " + nf(m.odometer) + "km" : "")
          + (m.driver ? '<br>🧑 ' + m.driver + (m.phone ? mkPhone(m.phone) : "") : "")
          + '</div>'
          + (m.note ? '<div style="font-size:12px;color:#C7C7CC;margin-top:2px">' + m.note + '</div>' : "")
          + '</div></div>'
          + '<div class="cf"><button class="btn-del" data-del="maints" data-id="' + m.id + '">삭제</button></div></div>';
      }).join("");

  var fuelHtml = S.fuels.length === 0
    ? '<div class="emp"><div class="ei">⛽</div><div class="em">주유 기록이 없습니다</div>'
      + '<button class="emp-btn" style="background:' + C.fuel + '" data-sheet="fuel">+ 주유 추가</button></div>'
    : S.fuels.map(function(f) {
        var v = veh(f.vehicleId);
        var photo = f.photo ? '<img class="th" src="' + f.photo + '" data-src="' + f.photo + '" data-label="주유영수증 · ' + (v ? v.name : "") + ' ' + f.date + '" data-viewer="1"/>' : "";
        var fDt = f.datetime || f.date || "";
        return '<div class="card"><div style="display:flex;gap:10px">' + photo
          + '<div style="flex:1;min-width:0">'
          + '<div class="rw"><span class="bdg" style="background:' + C.fuel + '18;color:' + C.fuel + '">' + (v ? v.name : "-") + '</span>'
          + '<span style="font-size:12px;color:#8E8E93">' + df(fDt) + '</span></div>'
          + '<div class="ct2">' + (f.station || "주유소") + '</div>'
          + '<div class="cs">'
          + (f.liters ? f.liters + "L" : "") + (f.amount ? " · " + nf(f.amount) + "원" : "")
          + (f.driver ? '<br>🧑 ' + f.driver + (f.phone ? mkPhone(f.phone) : "") : "")
          + '</div>'
          + '</div></div>'
          + '<div class="cf"><button class="btn-del" data-del="fuels" data-id="' + f.id + '">삭제</button></div></div>';
      }).join("");

  return '<div class="sh"><h2>기록</h2>'
    + '<button class="ab" style="background:' + (rt === "maint" ? C.maint : C.fuel) + '" data-sheet="' + rt + '">+ 추가</button></div>'
    + '<div class="ct">'
    + '<div class="subtabs">'
    + '<button class="subtab' + (rt === "maint" ? " on" : "") + '" data-rtab2="maint">🔧 정비 (' + S.maints.length + ')</button>'
    + '<button class="subtab' + (rt === "fuel" ? " on" : "") + '" data-rtab2="fuel">⛽ 주유 (' + S.fuels.length + ')</button>'
    + '</div>'
    + (rt === "maint" ? maintHtml : fuelHtml)
    + '</div>';
}

/* ── REPORT ──────────────────────────── */
function rReport() {
  var rVid = S.rVid, rFrom = S.rFrom, rTo = S.rTo, rTab = S.rTab;
  var rMode = S.rMode, rYear = S.rYear, rMonth = S.rMonth;

  function inR(date) {
    if (!date) return false;
    if (rMode === "range") return date >= rFrom && date <= rTo;
    if (rMode === "year")  return date.slice(0, 4) === rYear;
    if (rMode === "month") return date.slice(0, 7) === (rYear + "-" + rMonth);
    return false;
  }
  function bv(arr) { return rVid === "all" ? arr : arr.filter(function(x) { return x.vehicleId === rVid; }); }
  var fd = bv(S.drives).filter(function(d) { return inR(d.date || (d.departTime || "").slice(0, 10)); });
  var fm = bv(S.maints).filter(function(m) { return inR(m.date); });
  var ff = bv(S.fuels).filter(function(f) { return inR(f.date); });
  var tm = fm.reduce(function(s, m) { return s + (Number(m.cost) || 0); }, 0);
  var tf = ff.reduce(function(s, f) { return s + (Number(f.amount) || 0); }, 0);
  var tl = ff.reduce(function(s, f) { return s + (Number(f.liters) || 0); }, 0);

  // Year options: current year down to 2020
  var cy = new Date().getFullYear();
  var yearOpts = "";
  for (var y = cy; y >= 2020; y--) {
    yearOpts += '<option value="' + y + '"' + (rYear === String(y) ? " selected" : "") + '>' + y + '년</option>';
  }
  var monthOpts = "";
  for (var m = 1; m <= 12; m++) {
    var mv = String(m).padStart(2, "0");
    monthOpts += '<option value="' + mv + '"' + (rMonth === mv ? " selected" : "") + '>' + m + '월</option>';
  }

  var stats, list;
  if (rTab === "drive") {
    var uids = [];
    fd.forEach(function(d) { if (uids.indexOf(d.vehicleId) < 0) uids.push(d.vehicleId); });
    stats = [{ lb: "주행 건수", v: fd.length + "건", c: C.drive }, { lb: "운행 차량", v: uids.length + "대", c: C.veh }];
    list = fd.length === 0
      ? '<div class="emp"><div class="ei">🚗</div><div class="em">주행 기록 없음</div></div>'
      : fd.map(function(d) {
          var v = veh(d.vehicleId);
          var rk = (d.odometer && d.odoStart) ? nf(Number(d.odometer) - Number(d.odoStart)) : null;
          return '<div class="card">'
            + '<div class="rw"><span class="bdg" style="background:' + C.drive + '18;color:' + C.drive + '">' + (v ? v.name : "-") + '</span>'
            + (!d.arriveTime ? '<span class="bdg" style="background:#FF3B3018;color:#FF3B30">운행 중</span>' : '<span class="bdg" style="background:#34C75918;color:#34C759">복귀</span>') + '</div>'
            + '<div class="ct2">' + d.from + ' → ' + d.to + '</div>'
            + '<div class="cs">' + (d.driver || "") + (d.departTime ? " · " + df(d.departTime) : "") + (rk ? "<br>실주행 <strong>" + rk + "km</strong>" : "") + '</div>'
            + (d.purpose ? '<div style="font-size:12px;color:#C7C7CC;margin-top:2px">' + d.purpose + '</div>' : "")
            + '</div>';
        }).join("");
  } else if (rTab === "maint") {
    stats = [{ lb: "정비 건수", v: fm.length + "건", c: C.maint }, { lb: "총 비용", v: nf(tm) + "원", c: C.maint }];
    list = fm.length === 0
      ? '<div class="emp"><div class="ei">🔧</div><div class="em">정비 기록 없음</div></div>'
      : fm.map(function(m) {
          var v = veh(m.vehicleId);
          var mDt = m.datetime || m.date || "";
          return '<div class="card">'
            + '<div class="rw"><span class="bdg" style="background:' + C.maint + '18;color:' + C.maint + '">' + (v ? v.name : "-") + '</span>'
            + '<span style="font-size:12px;color:#8E8E93">' + df(mDt) + '</span></div>'
            + '<div class="ct2">' + m.type + '</div>'
            + '<div class="cs">' + (m.shop || "") + (m.cost ? " · " + nf(m.cost) + "원" : "")
            + (m.driver ? ' · 🧑 ' + m.driver + (m.phone ? mkPhone(m.phone) : "") : "")
            + '</div></div>';
        }).join("");
  } else {
    stats = [{ lb: "주유 건수", v: ff.length + "건", c: C.fuel }, { lb: "주유량", v: tl.toFixed(1) + "L", c: C.fuel }, { lb: "총 금액", v: nf(tf) + "원", c: C.fuel }];
    list = ff.length === 0
      ? '<div class="emp"><div class="ei">⛽</div><div class="em">주유 기록 없음</div></div>'
      : ff.map(function(f) {
          var v = veh(f.vehicleId);
          var fDt = f.datetime || f.date || "";
          return '<div class="card">'
            + '<div class="rw"><span class="bdg" style="background:' + C.fuel + '18;color:' + C.fuel + '">' + (v ? v.name : "-") + '</span>'
            + '<span style="font-size:12px;color:#8E8E93">' + df(fDt) + '</span></div>'

/* ── BIND ────────────────────────────── */
function bind() {
  // Nav tabs
  document.querySelectorAll("[data-tab]").forEach(function(b) {
    b.onclick = function() { set({ tab: b.dataset.tab, sheet: null }); };
  });
  // Refresh
  var rb = document.getElementById("refreshBtn"); if (rb) rb.onclick = loadData;
  // Sheet open
  document.querySelectorAll("[data-sheet]").forEach(function(b) {
    b.onclick = function() { PDU = null; set({ sheet: b.dataset.sheet, sheetId: null, resvData: null }); };
  });
  // Arrive
  document.querySelectorAll("[data-arrive]").forEach(function(b) {
    b.onclick = function() { PDU = null; set({ sheet: "arrive", sheetId: b.dataset.arrive }); };
  });
  // Start from reservation
  document.querySelectorAll("[data-resv-start]").forEach(function(b) {
    b.onclick = function() {
      var r = S.reservations.find(function(r) { return r.id === b.dataset.resvStart; });
      if (r) { PDU = null; set({ sheet: "drive", sheetId: r.id, resvData: r }); }
    };
  });
  // Delete (password-protected)
  document.querySelectorAll("[data-del]").forEach(function(b) {
    b.onclick = async function() {
      var col = b.dataset.del;
      if (col === "reservations") {
        // Reservation: use the reservation's own password
        var r = S.reservations.find(function(x) { return x.id === b.dataset.id; });
        var pw = prompt("🔒 예약 패스워드를 입력하세요:");
        if (pw === null) return;
        if (!r || pw !== (r.password || "")) return alert("패스워드가 틀렸습니다.");
      } else {
        // drives, maints, fuels, vehicles → admin password
        var pw = prompt("🔑 관리자 패스워드를 입력하세요:");
        if (pw === null) return;
        if (pw !== ADMIN_PW) return alert("관리자 패스워드가 틀렸습니다.");
      }
      await fsDel(col, b.dataset.id);
      var patch = {};
      patch[col] = S[col].filter(function(x) { return x.id !== b.dataset.id; });
      set(patch);
    };
  });
  // Report main tab
  document.querySelectorAll("[data-rtab]").forEach(function(b) { b.onclick = function() { set({ rTab: b.dataset.rtab }); }; });
  // Records sub-tab
  document.querySelectorAll("[data-rtab2]").forEach(function(b) { b.onclick = function() { set({ recordsTab: b.dataset.rtab2 }); }; });
  // Image viewer
  document.querySelectorAll("[data-viewer]").forEach(function(el) {
    el.onclick = function() { openImg(el); };
  });
  // Sheet close
  var xb = document.getElementById("xb"); if (xb) xb.onclick = function() { set({ sheet: null }); };
  var ov = document.getElementById("ov"); if (ov) ov.onclick = function(e) { if (e.target === ov) set({ sheet: null }); };
  // Report filters
  var rv = document.getElementById("r_vid");   if (rv) rv.onchange = function() { set({ rVid: rv.value }); };
  var rf = document.getElementById("r_from");  if (rf) rf.onchange = function() { set({ rFrom: rf.value }); };
  var rt = document.getElementById("r_to");    if (rt) rt.onchange = function() { set({ rTo: rt.value }); };
  var ry = document.getElementById("r_year");  if (ry) ry.onchange = function() { set({ rYear: ry.value }); };
  var rm = document.getElementById("r_month"); if (rm) rm.onchange = function() { set({ rMonth: rm.value }); };
  // Report mode tabs
  document.querySelectorAll("[data-rmode]").forEach(function(b) {
    b.onclick = function() { set({ rMode: b.dataset.rmode }); };
  });
  // Print
  var pb = document.getElementById("pBtn"); if (pb) pb.onclick = doPrint;
  // Photo upload
  var pbox = document.getElementById("pbox"), pfi = document.getElementById("pfi");
  if (pbox && pfi) {
    pbox.onclick = function() { pfi.click(); };
    pfi.onchange = async function(e) {
      var f = e.target.files[0]; if (!f) return;
      PDU = await toDU(f);
      pbox.innerHTML = f.type === "application/pdf"
        ? '<div style="font-size:24px">📄</div><div style="font-size:13px;color:#34C759;font-weight:500">PDF 등록됨</div>'
        : '<img src="' + PDU + '" style="max-height:110px;max-width:100%;border-radius:8px;object-fit:contain"/>';
    };
  }
  // Save
  var svb = document.getElementById("svb"); if (svb) svb.onclick = doSave;
}

/* ── SWIPE-TO-CLOSE SHEET ────────────── */
function bindSheetSwipe() {
  var sl = document.getElementById("sl");
  var handle = document.getElementById("dragHandle");
  if (!sl || !handle) return;
  var startY = 0, currY = 0, active = false;
  handle.addEventListener("touchstart", function(e) {
    startY = e.touches[0].clientY;
    currY = startY;
    active = true;
    sl.style.transition = "none";
  }, { passive: true });
  document.addEventListener("touchmove", function(e) {
    if (!active) return;
    currY = e.touches[0].clientY;
    var diff = currY - startY;
    if (diff > 0) sl.style.transform = "translateY(" + diff + "px)";
  }, { passive: true });
  document.addEventListener("touchend", function() {
    if (!active) return;
    active = false;
    var diff = currY - startY;
    if (diff > 110) {
      sl.style.transition = "transform .2s ease";
      sl.style.transform = "translateY(100%)";
      setTimeout(function() { set({ sheet: null }); }, 200);
    } else {
      sl.style.transition = "transform .25s ease";
      sl.style.transform = "";
    }
  }, { passive: true });
}

/* ── IMAGE VIEWER ────────────────────── */
function openImg(el) {
  var div = document.createElement("div");
  div.className = "imgview";
  div.innerHTML = '<button class="ivcls">✕</button><img src="' + el.dataset.src + '"/><div class="ivlb">' + (el.dataset.label || "사진") + ' · 탭하여 닫기</div>';
  div.onclick = function() { div.remove(); };
  div.querySelector(".ivcls").onclick = function(e) { e.stopPropagation(); div.remove(); };
  document.body.appendChild(div);
}

/* ── WINDOW HELPERS ──────────────────── */

// 집행 일시에 해당 차량을 주행 중인 운전자를 자동 조회
window.autoFillDriver = function(type) {
  var vid = gv("f_vid");
  var dt  = gv("f_datetime");
  if (!vid || !dt) return;
  var t = new Date(dt);
  var infoEl = document.getElementById("driver_auto_info");

  // 해당 차량·시간대의 주행 기록 검색
  var match = null;
  for (var i = 0; i < S.drives.length; i++) {
    var d = S.drives[i];
    if (d.vehicleId !== vid || !d.departTime) continue;
    var s = new Date(d.departTime);
    // 복귀 완료된 기록: departTime ~ arriveTime 범위
    if (d.arriveTime) {
      if (t >= s && t <= new Date(d.arriveTime)) { match = d; break; }
    } else {
      // 아직 운행 중: 출발 시간 이후면 매칭
      if (t >= s) { match = d; break; }
    }
  }

  var driverEl = document.getElementById(type === "maint" ? "f_maint_driver" : "f_driver");
  var phoneEl  = document.getElementById(type === "maint" ? "f_maint_phone"  : "f_phone");

  if (match) {
    if (driverEl) driverEl.value = match.driver || "";
    if (phoneEl)  phoneEl.value  = match.driverPhone || "";
    if (infoEl) {
      infoEl.style.display = "block";
      infoEl.style.color = "#34C759";
      infoEl.textContent = "✅ 주행 기록에서 자동 입력 · "
        + df(match.departTime) + " ~ "
        + (match.arriveTime ? df(match.arriveTime) : "운행 중");
    }
  } else {
    if (driverEl) driverEl.value = "";
    if (phoneEl)  phoneEl.value  = "";
    if (infoEl) {
      infoEl.style.display = "block";
      infoEl.style.color = "#FF9500";
      infoEl.textContent = "⚠️ 해당 시간에 이 차량의 주행 기록이 없습니다";
    }
  }
};

window.updOdo = function(vid) {
  var ld = S.drives.find(function(d) { return d.vehicleId === vid && d.odometer; });
  var os = ld ? ld.odometer : "";
  var el = document.getElementById("f_odo_start"); if (el) el.value = os;
  var lb = document.getElementById("odo_lbl"); if (lb) lb.textContent = os ? "✅ 자동 입력" : "";
  var now = new Date();
  var vResv = S.reservations
    .filter(function(r) { return r.vehicleId === vid && new Date(r.endTime) >= now; })
    .sort(function(a, b) { return a.startTime.localeCompare(b.startTime); }).slice(0, 3);
  var ri = document.getElementById("resv_info");
  if (ri) {
    if (vResv.length > 0) {
      ri.style.display = "block";
      ri.innerHTML = '<div style="font-size:12px;font-weight:600;color:#92400E;margin-bottom:6px">⚠️ 이 차량의 예약 현황</div>'
        + vResv.map(function(r) {
            return '<div style="font-size:12px;color:#92400E;padding:4px 0;border-bottom:.5px solid #FDE68A44">'
              + r.name + mkPhone(r.phone) + ' · ' + df(r.startTime) + ' ~ ' + df(r.endTime).slice(11, 16)
              + (r.purpose ? " (" + r.purpose + ")" : "") + '</div>';
          }).join("");
    } else {
      ri.style.display = "none";
      ri.innerHTML = "";
    }
  }
};

/* ── SAVE ────────────────────────────── */
async function doSave() {
  var s = S.sheet;
  if (s === "resv") {
    var vid = gv("f_vid"), st = gv("f_start"), et = gv("f_end"), nm = gv("f_name"), ph = gv("f_phone"), pwd = gv("f_pwd");
    if (!vid || !st || !et || !nm || !ph || !gv("f_from") || !gv("f_to")) return alert("필수 항목(*)을 모두 입력해주세요.");
    if (!pwd || !/^\d{4}$/.test(pwd)) return alert("패스워드는 숫자 4자리로 입력해주세요.");
    if (new Date(et) <= new Date(st)) return alert("종료 시간이 시작 시간보다 빠릅니다.");
    var mx = new Date(); mx.setDate(mx.getDate() + 7);
    if (new Date(st) > mx) return alert("예약은 7일 이내만 가능합니다.");
    var ovD = S.drives.find(function(d) {
      if (d.vehicleId !== vid || !d.arriveTime) return false;
      return new Date(st) < new Date(d.arriveTime) && new Date(et) > new Date(d.departTime);
    });
    if (ovD) return alert("해당 시간에 이미 주행 기록이 있습니다.\n(" + df(ovD.departTime) + " ~ " + df(ovD.arriveTime) + ")");
    var ovR = S.reservations.find(function(r) {
      if (r.vehicleId !== vid) return false;
      return new Date(st) < new Date(r.endTime) && new Date(et) > new Date(r.startTime);
    });
    if (ovR) return alert("해당 시간에 이미 예약이 있습니다.\n" + ovR.name + (ovR.phone ? " (" + ovR.phone + ")" : "") + "\n" + df(ovR.startTime) + " ~ " + df(ovR.endTime).slice(11, 16));
    var data = { vehicleId: vid, name: nm, phone: ph, from: gv("f_from"), to: gv("f_to"), startTime: st, endTime: et, purpose: gv("f_purpose"), password: pwd };
    var id = await fsAdd("reservations", data);
    set({ reservations: [Object.assign({ id: id }, data, { createdAt: Date.now() })].concat(S.reservations), sheet: null, tab: "resv" });

  } else if (s === "drive") {
    var vid = gv("f_vid"), dep = gv("f_depart"), driver = gv("f_driver");
    if (!vid || !driver || !dep || !gv("f_from") || !gv("f_to")) return alert("필수 항목(*)을 모두 입력해주세요.");
    var inUse = S.drives.find(function(d) { return d.vehicleId === vid && !d.arriveTime; });
    if (inUse) return alert("이 차량은 현재 운행 중입니다.\n(" + inUse.driver + " · " + inUse.from + " → " + inUse.to + ")\n복귀 입력 후 출발 등록해주세요.");
    var nd = new Date(dep);
    var ovDr = S.drives.find(function(d) {
      if (d.vehicleId !== vid || !d.arriveTime) return false;
      return nd >= new Date(d.departTime) && nd <= new Date(d.arriveTime);
    });
    if (ovDr) return alert("출발 시간이 기존 주행 기록과 겹칩니다.\n(" + df(ovDr.departTime) + " ~ " + df(ovDr.arriveTime) + ")");
    var ovResv = S.reservations.find(function(r) {
      if (r.vehicleId !== vid) return false;
      if (r.name === driver) return false;
      return nd >= new Date(r.startTime) && nd <= new Date(r.endTime);
    });
    if (ovResv) return alert("이 차량은 예약된 시간입니다.\n예약자: " + ovResv.name + (ovResv.phone ? " (" + ovResv.phone + ")" : "") + "\n(" + df(ovResv.startTime) + " ~ " + df(ovResv.endTime).slice(11, 16) + ")");
    var ld = S.drives.find(function(d) { return d.vehicleId === vid && d.odometer; });
    var autoOs = ld ? ld.odometer : "";
    var inputOs = gv("f_odo_start");
    var odoStart = inputOs || autoOs;
    var odoStartModified = (autoOs && inputOs && inputOs !== autoOs) ? "Y" : "N";
    var data = { vehicleId: vid, driver: driver, driverPhone: gv("f_driver_phone"), date: today(), departTime: dep, arriveTime: "", from: gv("f_from"), to: gv("f_to"), purpose: gv("f_purpose"), odoStart: odoStart, odoStartModified: odoStartModified, odometer: "", photo: null };
    var id = await fsAdd("drives", data);
    var newDrive = Object.assign({ id: id }, data, { createdAt: Date.now() });
    var matchedResvId = null;
    if (S.sheetId && S.resvData) {
      matchedResvId = S.sheetId;
    } else {
      var matched = S.reservations.find(function(r) {
        if (r.vehicleId !== vid || r.name !== driver) return false;
        return nd >= new Date(r.startTime) && nd <= new Date(r.endTime);
      });
      if (matched) matchedResvId = matched.id;
    }
    if (matchedResvId) {
      await fsDel("reservations", matchedResvId);
      set({ drives: [newDrive].concat(S.drives), reservations: S.reservations.filter(function(r) { return r.id !== matchedResvId; }), sheet: null, resvData: null });
    } else {
      set({ drives: [newDrive].concat(S.drives), sheet: null });
    }

  } else if (s === "arrive") {
    var at = gv("f_arrive"), odo = gv("f_odometer");
    if (!at) return alert("도착 일시를 입력해주세요.");
    var d = S.drives.find(function(d) { return d.id === S.sheetId; });
    if (d && d.departTime && new Date(at) <= new Date(d.departTime)) return alert("도착 시간이 출발 시간보다 빠릅니다.");
    var ovAr = S.drives.find(function(dr) {
      if (dr.vehicleId !== (d && d.vehicleId) || !dr.arriveTime || dr.id === S.sheetId) return false;
      var ds = new Date(d.departTime), de = new Date(at), rs = new Date(dr.departTime), re = new Date(dr.arriveTime);
      return ds < re && de > rs;
    });
    if (ovAr) return alert("도착 시간이 기존 주행 기록과 겹칩니다.\n(" + df(ovAr.departTime) + " ~ " + df(ovAr.arriveTime) + ")");
    await fsUpd("drives", S.sheetId, { arriveTime: at, odometer: odo, photo: PDU });
    set({ drives: S.drives.map(function(d) { return d.id === S.sheetId ? Object.assign({}, d, { arriveTime: at, odometer: odo, photo: PDU }) : d; }), sheet: null });

  } else if (s === "maint") {
    var dt = gv("f_datetime");
    var data = {
      vehicleId: gv("f_vid"),
      datetime: dt, date: dt.slice(0, 10),   // date kept for filter compat
      type: gv("f_type"), shop: gv("f_shop"), cost: gv("f_cost"),
      odometer: gv("f_maint_odo"), note: gv("f_note"),
      driver: gv("f_maint_driver"), phone: gv("f_maint_phone"),
      photo: PDU
    };
    if (!data.vehicleId || !data.datetime || !data.type) return alert("필수 항목(*)을 모두 입력해주세요.");
    var id = await fsAdd("maints", data);
    set({ maints: [Object.assign({ id: id }, data, { createdAt: Date.now() })].concat(S.maints), sheet: null });

  } else if (s === "fuel") {
    var dt = gv("f_datetime");
    var data = {
      vehicleId: gv("f_vid"),
      datetime: dt, date: dt.slice(0, 10),   // date kept for filter compat
      driver: gv("f_driver"), phone: gv("f_phone"),
      station: gv("f_station"), liters: gv("f_liters"), amount: gv("f_amount"),
      photo: PDU
    };
    if (!data.vehicleId || !data.datetime) return alert("필수 항목(*)을 입력해주세요.");
    var id = await fsAdd("fuels", data);
    set({ fuels: [Object.assign({ id: id }, data, { createdAt: Date.now() })].concat(S.fuels), sheet: null });

  } else if (s === "veh") {
    var data = { name: gv("f_name"), plate: gv("f_plate"), dept: gv("f_dept"), color: gv("f_color") };
    if (!data.name || !data.plate) return alert("차량명과 번호판을 입력해주세요.");
    var id = await fsAdd("vehicles", data);
    set({ vehicles: S.vehicles.concat([Object.assign({ id: id }, data, { createdAt: Date.now() })]), sheet: null });
  }
}

/* ── PRINT ───────────────────────────── */
function doPrint() {
  var rVid = S.rVid, rFrom = S.rFrom, rTo = S.rTo, rTab = S.rTab;
  var rMode = S.rMode, rYear = S.rYear, rMonth = S.rMonth;
  function inR(date) {
    if (!date) return false;
    if (rMode === "range") return date >= rFrom && date <= rTo;
    if (rMode === "year")  return date.slice(0, 4) === rYear;
    if (rMode === "month") return date.slice(0, 7) === (rYear + "-" + rMonth);
    return false;
  }
  function bv(arr) { return rVid === "all" ? arr : arr.filter(function(x) { return x.vehicleId === rVid; }); }
  var vn = rVid === "all" ? "전체 차량" : ((veh(rVid) && veh(rVid).name) || "-");
  var tl = rTab === "drive" ? "주행" : rTab === "maint" ? "정비" : "주유";
  var periodLabel = rMode === "year" ? rYear + "년"
    : rMode === "month" ? rYear + "년 " + Number(rMonth) + "월"
    : rFrom + " ~ " + rTo;
  var fd = bv(S.drives).filter(function(d) { return inR(d.date || (d.departTime || "").slice(0, 10)); });
  var fm = bv(S.maints).filter(function(m) { return inR(m.date); });
  var ff = bv(S.fuels).filter(function(f) { return inR(f.date); });
  var tm = fm.reduce(function(s, m) { return s + (Number(m.cost) || 0); }, 0);
  var tf = ff.reduce(function(s, f) { return s + (Number(f.amount) || 0); }, 0);
  var tli = ff.reduce(function(s, f) { return s + (Number(f.liters) || 0); }, 0);
  var cnt = rTab === "drive" ? fd.length : rTab === "maint" ? fm.length : ff.length;
  var tbl = "";
  if (rTab === "drive") {
    tbl = '<table><thead><tr><th>차량명</th><th>차량번호</th><th>운전자</th><th>출발지</th><th>목적지</th><th>출발 일시</th><th>도착 일시</th><th>출발(km)</th><th>도착(km)</th><th>실주행(km)</th><th>목적</th><th>상태</th></tr></thead><tbody>'
      + fd.map(function(d) {
          var v = veh(d.vehicleId);
          var rk = (d.odometer && d.odoStart) ? nf(Number(d.odometer) - Number(d.odoStart)) : "";
          return '<tr><td>' + (v ? v.name : "-") + '</td><td>' + (v ? v.plate : "-") + '</td><td>' + (d.driver || "") + '</td><td>' + (d.from || "") + '</td><td>' + (d.to || "") + '</td><td>' + df(d.departTime) + '</td><td>' + df(d.arriveTime) + '</td><td>' + (d.odoStart ? nf(d.odoStart) : "") + '</td><td>' + (d.odometer ? nf(d.odometer) : "") + '</td><td>' + rk + '</td><td>' + (d.purpose || "") + '</td><td>' + (d.arriveTime ? "복귀" : "운행 중") + '</td></tr>';
        }).join("")
      + '</tbody></table>';
  } else if (rTab === "maint") {
    tbl = '<table><thead><tr><th>차량명</th><th>차량번호</th><th>집행 일시</th><th>정비 항목</th><th>정비소</th><th>비용(원)</th><th>운전자</th><th>연락처</th><th>메모</th></tr></thead><tbody>'
      + fm.map(function(m) {
          var v = veh(m.vehicleId);
          var mDt = m.datetime || m.date || "";
          return '<tr><td>' + (v ? v.name : "-") + '</td><td>' + (v ? v.plate : "-") + '</td><td>' + df(mDt) + '</td><td>' + m.type + '</td><td>' + (m.shop || "") + '</td><td>' + (m.cost ? nf(m.cost) : "") + '</td><td>' + (m.driver || "") + '</td><td>' + (m.phone || "") + '</td><td>' + (m.note || "") + '</td></tr>';
        }).join("")
      + '<tr class="tot"><td colspan="5">합계</td><td>' + nf(tm) + '원</td><td colspan="3"></td></tr></tbody></table>';
  } else {
    tbl = '<table><thead><tr><th>차량명</th><th>차량번호</th><th>집행 일시</th><th>운전자</th><th>연락처</th><th>주유소</th><th>주유량(L)</th><th>금액(원)</th></tr></thead><tbody>'
      + ff.map(function(f) {
          var v = veh(f.vehicleId);
          var fDt = f.datetime || f.date || "";
          return '<tr><td>' + (v ? v.name : "-") + '</td><td>' + (v ? v.plate : "-") + '</td><td>' + df(fDt) + '</td><td>' + (f.driver || "") + '</td><td>' + (f.phone || "") + '</td><td>' + (f.station || "") + '</td><td>' + (f.liters || "") + '</td><td>' + (f.amount ? nf(f.amount) : "") + '</td></tr>';
        }).join("")
      + '<tr class="tot"><td colspan="6">합계</td><td>' + tli.toFixed(1) + 'L</td><td>' + nf(tf) + '원</td></tr></tbody></table>';
  }
  var w = window.open("", "_blank");
  if (!w) return alert("팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.");
  w.document.write('<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/><title>법인차량 ' + tl + ' 기록</title>'
    + '<style>body{font-family:-apple-system,sans-serif;padding:24px;color:#1a1a1a;font-size:13px}h2{font-size:18px;margin-bottom:4px}.sub{font-size:13px;color:#666;margin-bottom:20px}table{width:100%;border-collapse:collapse}th{background:#f0f0f0;padding:8px 10px;text-align:left;font-size:12px;border:1px solid #ddd}td{padding:7px 10px;border:1px solid #e5e5e5;font-size:12px}tr:nth-child(even) td{background:#fafafa}tr.tot td{font-weight:bold;background:#f5f5f5}@media print{body{padding:0}}</style>'
    + '</head><body><h2>법인차량 ' + tl + ' 기록</h2><div class="sub">' + vn + ' · ' + periodLabel + ' · 총 ' + cnt + '건</div>' + tbl + '</body></html>');
  w.document.close();
  w.focus();
  setTimeout(function() { w.print(); }, 500);
}

/* ── LOAD ────────────────────────────── */
async function loadData() {
  set({ loading: true, error: null });
  try {
    var results = await Promise.all([
      fsGet("vehicles"), fsGet("drives"), fsGet("maints"), fsGet("fuels"), fsGet("reservations")
    ]);
    set({ vehicles: results[0], drives: results[1], maints: results[2], fuels: results[3], reservations: results[4], loading: false });
  } catch (e) {
    set({ loading: false, error: e.message || "연결 실패" });
  }
}
loadData();
