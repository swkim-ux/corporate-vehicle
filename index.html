<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>세종기술 스마트 차량관리 시스템</title>
  <style>
    /* ── 디자인 시스템 ── */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #1c1e21; line-height: 1.5; }
    #app { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
    
    /* 네비게이션 */
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #fff; display: flex; border-top: 1px solid #e5e5e5; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-item { flex: 1; border: none; background: none; padding: 12px 0; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8d949e; transition: 0.2s; }
    .nav-item.active { color: #1877f2; font-weight: bold; }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 11px; }

    /* 헤더 및 컨텐츠 */
    .header { padding: 24px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .content { padding: 0 20px; }
    .sec-title { margin: 20px 0 12px; font-size: 16px; font-weight: 600; }

    /* 카드 디자인 */
    .card { background: #fff; border: 1px solid #ebedf0; border-radius: 16px; padding: 16px; margin-bottom: 12px; position: relative; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
    
    /* 버튼 */
    .btn-add { background: #1877f2; color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-del { font-size: 12px; color: #bec3c9; border: none; background: none; cursor: pointer; float: right; }
    .btn-save { width: 100%; padding: 16px; background: #1877f2; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; margin-top: 10px; cursor: pointer; }
    .btn-save:disabled { background: #e4e6eb; color: #bcc0c4; cursor: not-allowed; }

    /* 입력 폼 (시트) */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: flex-end; }
    .sheet { width: 100%; max-width: 500px; background: #fff; border-radius: 24px 24px 0 0; padding: 24px; max-height: 90vh; overflow-y: auto; margin: 0 auto; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #606770; margin-bottom: 6px; }
    .field input, .field select { width: 100%; padding: 12px; border: 1px solid #dddfe2; border-radius: 10px; font-size: 16px; outline: none; background: #f5f6f7; }
    .field input:focus { border-color: #1877f2; background: #fff; }
    
    .warning-box { background: #fff0f0; color: #ff4d4f; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; font-weight: 500; display: none; }
    .hint-text { font-size: 11px; color: #8d949e; margin-top: 4px; }

    /* 테이블 */
    table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; border-radius: 8px; overflow: hidden; }
    th { background: #f0f2f5; padding: 10px; text-align: left; border: 1px solid #ddd; }
    td { padding: 10px; border: 1px solid #ddd; }
    
    @media print { .nav, .btn-add, .btn-del { display: none !important; } }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── 환경 설정 ──
const FB_CONFIG = {
  apiKey: "AIzaSyCPvMbFfXHUgkYfJ3ZRcp5ypATRo8xLOAo",
  authDomain: "corporate-vehicle.firebaseapp.com",
  projectId: "corporate-vehicle",
  storageBucket: "corporate-vehicle.firebasestorage.app",
  messagingSenderId: "419510195247",
  appId: "1:419510195247:web:602f11bb4696102b1ca2da"
};

const fbApp = getApps().length ? getApps()[0] : initializeApp(FB_CONFIG);
const db = getFirestore(fbApp);

// ── 데이터베이스 연동 ──
async function fsGet(col) {
  const q = query(collection(db, col), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function fsAdd(col, data) { return await addDoc(collection(db, col), { ...data, createdAt: Date.now() }); }
async function fsUpdate(col, id, data) { await updateDoc(doc(db, col, id), data); }
async function fsDel(col, id) { await deleteDoc(doc(db, col, id)); }

// ── 유틸리티 ──
const nowLocal = () => {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
};
const num = n => Number(n).toLocaleString();

// ── 앱 상태 ──
let S = { tab: "home", sheet: null, sheetId: null, vehicles: [], drives: [], loading: true, lastOdo: 0 };
function set(patch) { S = { ...S, ...patch }; render(); }

// ── 핵심 로직 함수 ──
function getActiveDrive(vid) {
  return S.drives.find(d => d.vehicleId === vid && !d.arriveTime);
}

function getPrevOdometer(vid) {
  const finished = S.drives.filter(d => d.vehicleId === vid && d.arriveOdo).sort((a,b) => b.createdAt - a.createdAt);
  return finished.length > 0 ? Number(finished[0].arriveOdo) : 0;
}

// ── 렌더링 ──
function render() {
  const app = document.getElementById("app");
  if (S.loading) { app.innerHTML = `<div style="padding:100px; text-align:center; color:#888;">데이터를 불러오는 중...</div>`; return; }

  let bodyHtml = "";
  if (S.tab === "home") bodyHtml = renderHome();
  else if (S.tab === "drive") bodyHtml = renderDrives();
  else if (S.tab === "report") bodyHtml = renderReport();
  else if (S.tab === "veh") bodyHtml = renderVehs();

  const navHtml = `
    <nav class="nav">
      <button class="nav-item ${S.tab==='home'?'active':''}" onclick="changeTab('home')"><span class="nav-icon">🏠</span><span class="nav-label">홈</span></button>
      <button class="nav-item ${S.tab==='drive'?'active':''}" onclick="changeTab('drive')"><span class="nav-icon">🚗</span><span class="nav-label">주행</span></button>
      <button class="nav-item ${S.tab==='report'?'active':''}" onclick="changeTab('report')"><span class="nav-icon">📊</span><span class="nav-label">기록</span></button>
      <button class="nav-item ${S.tab==='veh'?'active':''}" onclick="changeTab('veh')"><span class="nav-icon">📋</span><span class="nav-label">차량</span></button>
    </nav>`;

  const sheetHtml = S.sheet ? `
    <div class="overlay" onclick="if(event.target===this)set({sheet:null})">
      <div class="sheet">${renderSheetBody()}</div>
    </div>` : "";

  app.innerHTML = bodyHtml + navHtml + sheetHtml;
}

function renderHome() {
  const drivingCount = S.drives.filter(d => !d.arriveTime).length;
  return `
    <div class="header"><h1>차량관리 시스템</h1></div>
    <div class="content">
      <div class="card" style="background: #1877f2; color: #fff; border:none;">
        <div style="font-size:14px; opacity:0.9">반갑습니다, 김시원 대리님</div>
        <div style="font-size:22px; font-weight:800; margin-top:5px">현재 ${drivingCount}대 운행 중</div>
      </div>
      <div class="sec-title">품질부 차량 현황</div>
      ${S.vehicles.map(v => {
        const out = getActiveDrive(v.id);
        return `<div class="card">
          <div class="badge" style="background:${out?'#fff0f0':'#e7f3ff'}; color:${out?'#ff4d4f':'#1877f2'}">${out?'운행중':'대기중'}</div>
          <div style="font-weight:600; font-size:16px;">${v.name} (${v.plate})</div>
          <div style="font-size:13px; color:#606770; margin-top:4px">${out ? `${out.driver}대리 (${out.to} 이동 중)` : '본사 주차장 위치'}</div>
        </div>`;
      }).join("")}
    </div>`;
}

function renderDrives() {
  return `
    <div class="header"><h1>주행 목록</h1><button class="btn-add" onclick="set({sheet:'drive'})">+ 출발 등록</button></div>
    <div class="content">
      ${S.drives.map(d => {
        const v = S.vehicles.find(v => v.id === d.vehicleId);
        return `<div class="card">
          <button class="btn-del" onclick="deleteData('drives','${d.id}')">삭제</button>
          <div class="badge" style="background:#f0f2f5">${v?.name || '차량'}</div>
          <div style="font-weight:600;">${d.from} → ${d.to}</div>
          <div style="font-size:12px; color:#8d949e; margin-top:4px">${d.driver} | ${d.departTime.replace('T',' ')}</div>
          ${!d.arriveTime ? `<button class="btn-save" style="padding:10px; font-size:13px;" onclick="set({sheet:'arrive', sheetId:'${d.id}'})">복귀 입력</button>` : `<div style="margin-top:8px; font-size:12px; color:#1877f2; font-weight:600;">✅ 복귀완료 (${num(d.arriveOdo)}km)</div>`}
        </div>`;
      }).join("")}
    </div>`;
}

function renderReport() {
  return `<div class="header"><h1>운행 기록부</h1><button class="btn-add" style="background:#42b72a" onclick="window.print()">인쇄하기</button></div>
          <div class="content">
            <table>
              <thead><tr><th>차량</th><th>운전자</th><th>구간</th><th>출발Odo</th><th>복귀Odo</th></tr></thead>
              <tbody>
                ${S.drives.map(d => `<tr>
                  <td>${S.vehicles.find(v=>v.id===d.vehicleId)?.name || '-'}</td>
                  <td>${d.driver}</td>
                  <td>${d.from}~${d.to}</td>
                  <td>${d.departOdo}${d.odoMismatch?'⚠️':''}</td>
                  <td>${d.arriveOdo || '-'}</td>
                </tr>`).join("")}
              </tbody>
            </table>
            <p style="font-size:10px; color:#888; margin-top:10px;">* ⚠️ 표시는 이전 기록과 다르게 수동 수정된 주행거리입니다.</p>
          </div>`;
}

function renderVehs() {
  return `<div class="header"><h1>차량 관리</h1><button class="btn-add" onclick="set({sheet:'veh'})">+ 차량 등록</button></div>
          <div class="content">
            ${S.vehicles.map(v => `<div class="card"><button class="btn-del" onclick="deleteData('vehicles','${v.id}')">삭제</button><b>${v.name}</b><br><small>${v.plate}</small></div>`).join("")}
          </div>`;
}

function renderSheetBody() {
  if (S.sheet === 'drive') {
    return `
      <h2 style="margin-bottom:15px">출발 등록</h2>
      <div id="drive_warn" class="warning-box"></div>
      <div class="field"><label>차량 선택</label>
        <select id="f_vid" onchange="onSelectVehicle(this.value)">
          <option value="">차량을 선택하세요</option>
          ${S.vehicles.map(v => `<option value="${v.id}">${v.name} (${v.plate})</option>`).join("")}
        </select>
      </div>
      <div class="field"><label>운전자</label><input id="f_driver" value="김시원"></div>
      <div class="field"><label>출발 시 주행거리(km)</label>
        <input type="number" id="f_depart_odo">
        <div id="odo_hint" class="hint-text">차량을 선택하면 이전 거리가 표시됩니다.</div>
      </div>
      <div class="grid2" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div class="field"><label>출발지</label><input id="f_from" value="본사"></div>
        <div class="field"><label>목적지</label><input id="f_to"></div>
      </div>
      <div class="field"><label>출발 시간</label><input type="datetime-local" id="f_time" value="${nowLocal()}"></div>
      <button class="btn-save" id="btn_drive_submit" onclick="saveDrive()">출발 등록 완료</button>`;
  }
  
  if (S.sheet === 'arrive') {
    return `
      <h2 style="margin-bottom:15px">복귀 등록</h2>
      <div class="field"><label>복귀 시간</label><input type="datetime-local" id="f_arrive_time" value="${nowLocal()}"></div>
      <div class="field"><label>현재 주행거리(km)</label><input type="number" id="f_arrive_odo" placeholder="계기판 숫자를 입력하세요"></div>
      <button class="btn-save" onclick="saveArrive()">복귀 완료</button>`;
  }

  if (S.sheet === 'veh') {
    return `
      <h2 style="margin-bottom:15px">새 차량 등록</h2>
      <div class="field"><label>차량명</label><input id="f_vname" placeholder="예: 쏘렌토"></div>
      <div class="field"><label>번호판</label><input id="f_vplate" placeholder="예: 123가 4567"></div>
      <button class="btn-save" onclick="saveVeh()">차량 추가</button>`;
  }
}

// ── 브라우저 이벤트용 함수 ──
window.changeTab = (t) => set({ tab: t });

window.onSelectVehicle = (vid) => {
  const warn = document.getElementById('drive_warn');
  const btn = document.getElementById('btn_drive_submit');
  const odoInput = document.getElementById('f_depart_odo');
  const odoHint = document.getElementById('odo_hint');

  // 1. 재출발 차단 로직
  const active = getActiveDrive(vid);
  if (active) {
    warn.innerText = "⚠️ 해당 차량은 아직 복귀하지 않았습니다. 복귀 처리를 먼저 해주세요.";
    warn.style.display = "block";
    btn.disabled = true;
  } else {
    warn.style.display = "none";
    btn.disabled = false;
  }

  // 2. 이전 거리 자동 입력 로직
  const lastKm = getPrevOdometer(vid);
  odoInput.value = lastKm;
  odoHint.innerText = `최근 기록된 거리: ${num(lastKm)}km`;
  S.lastOdo = lastKm; // 비교용 임시저장
};

window.saveDrive = async () => {
  const vid = document.getElementById('f_vid').value;
  const currentOdo = Number(document.getElementById('f_depart_odo').value);
  if (!vid) return alert("차량을 선택하세요.");

  await fsAdd("drives", {
    vehicleId: vid,
    driver: document.getElementById('f_driver').value,
    departOdo: currentOdo,
    odoMismatch: currentOdo !== S.lastOdo, // 이전 기록과 다르면 경고 플래그
    from: document.getElementById('f_from').value,
    to: document.getElementById('f_to').value,
    departTime: document.getElementById('f_time').value,
    arriveTime: ""
  });
  set({ sheet: null });
  loadData();
};

window.saveArrive = async () => {
  const odo = document.getElementById('f_arrive_odo').value;
  const time = document.getElementById('f_arrive_time').value;
  if (!odo) return alert("주행거리를 입력하세요.");
  await fsUpdate("drives", S.sheetId, { arriveTime: time, arriveOdo: Number(odo) });
  set({ sheet: null });
  loadData();
};

window.saveVeh = async () => {
  const name = document.getElementById('f_vname').value;
  const plate = document.getElementById('f_vplate').value;
  if (!name || !plate) return alert("내용을 입력하세요.");
  await fsAdd("vehicles", { name, plate });
  set({ sheet: null });
  loadData();
};

window.deleteData = async (col, id) => {
  if (confirm("정말 삭제하시겠습니까?")) {
    await fsDel(col, id);
    loadData();
  }
};

async function loadData() {
  set({ loading: true });
  try {
    const [v, d] = await Promise.all([fsGet("vehicles"), fsGet("drives")]);
    set({ vehicles: v, drives: d, loading: false });
  } catch (e) {
    alert("데이터 로드 실패!");
    set({ loading: false });
  }
}

// 초기 실행
loadData();
</script>
</body>
</html>
