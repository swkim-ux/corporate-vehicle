<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>세종기술 스마트 차량관리</title>
  <style>
    /* 디자인은 이전과 동일하게 유지 (가독성을 위해 스타일 생략 없이 전체 포함) */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: #f0f2f5; color: #1c1e21; }
    #app { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; padding-bottom: 80px; position: relative; }
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #fff; display: flex; border-top: 1px solid #e5e5e5; z-index: 1000; }
    .nav-item { flex: 1; border: none; background: none; padding: 12px 0; cursor: pointer; display: flex; flex-direction: column; align-items: center; color: #8d949e; }
    .nav-item.active { color: #1877f2; font-weight: bold; }
    .header { padding: 24px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
    .content { padding: 0 20px; }
    .card { background: #fff; border: 1px solid #ebedf0; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
    .btn-add { background: #1877f2; color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; }
    .btn-save { width: 100%; padding: 16px; background: #1877f2; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; margin-top: 10px; }
    .btn-save:disabled { background: #e4e6eb; color: #bcc0c4; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: flex-end; }
    .sheet { width: 100%; max-width: 500px; background: #fff; border-radius: 24px 24px 0 0; padding: 24px; max-height: 90vh; overflow-y: auto; margin: 0 auto; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #606770; margin-bottom: 6px; }
    .field input, .field select { width: 100%; padding: 12px; border: 1px solid #dddfe2; border-radius: 10px; font-size: 16px; background: #f5f6f7; }
    .warning-box { background: #fff0f0; color: #ff4d4f; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
    th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── 1. 설정 및 초기화 ──
const FB_CONFIG = {
  apiKey: "AIzaSyCPvMbFfXHUgkYfJ3ZRcp5ypATRo8xLOAo",
  authDomain: "corporate-vehicle.firebaseapp.com",
  projectId: "corporate-vehicle",
  storageBucket: "corporate-vehicle.firebasestorage.app",
  messagingSenderId: "419510195247",
  appId: "1:419510195247:web:602f11bb4696102b1ca2da"
};

const fbApp = getApps().length ? getApps()[0] : initializeApp(FB_CONFIG);
const db = getFirestore(fbApp);

// ── 2. 상태 관리 변수 ──
let S = { tab: "home", sheet: null, sheetId: null, vehicles: [], drives: [], loading: true, lastOdo: 0 };

// ── 3. 핵심 함수 (위치 중요: 호출부보다 위에 있어야 함) ──
async function fsGet(col) {
  try {
    const q = query(collection(db, col), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { console.error("Get Error:", e); return []; }
}

// 데이터를 불러오는 핵심 함수
async function loadData() {
  set({ loading: true });
  try {
    const [v, d] = await Promise.all([fsGet("vehicles"), fsGet("drives")]);
    set({ vehicles: v, drives: d, loading: false });
  } catch (e) {
    console.error("Load Error:", e);
    set({ loading: false });
  }
}

// 화면을 그리는 함수
function set(patch) { 
  S = { ...S, ...patch }; 
  render(); 
}

// ── 4. 유틸리티 및 비즈니스 로직 ──
const nowLocal = () => {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
};
const getActiveDrive = (vid) => S.drives.find(d => d.vehicleId === vid && !d.arriveTime);
const getPrevOdometer = (vid) => {
  const finished = S.drives.filter(d => d.vehicleId === vid && d.arriveOdo).sort((a,b) => b.createdAt - a.createdAt);
  return finished.length > 0 ? Number(finished[0].arriveOdo) : 0;
};

// ── 5. 렌더링 엔진 ──
function render() {
  const app = document.getElementById("app");
  if (S.loading) { app.innerHTML = `<div style="padding:100px; text-align:center;">데이터를 불러오는 중...</div>`; return; }

  let html = "";
  if (S.tab === "home") html = renderHome();
  else if (S.tab === "drive") html = renderDrives();
  else if (S.tab === "report") html = renderReport();
  else if (S.tab === "veh") html = renderVehs();

  const nav = `
    <nav class="nav">
      <button class="nav-item ${S.tab==='home'?'active':''}" onclick="window.changeTab('home')">🏠<small>홈</small></button>
      <button class="nav-item ${S.tab==='drive'?'active':''}" onclick="window.changeTab('drive')">🚗<small>주행</small></button>
      <button class="nav-item ${S.tab==='report'?'active':''}" onclick="window.changeTab('report')">📊<small>기록</small></button>
      <button class="nav-item ${S.tab==='veh'?'active':''}" onclick="window.changeTab('veh')">📋<small>차량</small></button>
    </nav>`;

  const sheet = S.sheet ? `
    <div class="overlay" onclick="if(event.target===this)set({sheet:null})">
      <div class="sheet">${renderSheetBody()}</div>
    </div>` : "";

  app.innerHTML = html + nav + sheet;
}

function renderHome() {
  const drivingCount = S.drives.filter(d => !d.arriveTime).length;
  return `
    <div class="header"><h1>차량관리</h1></div>
    <div class="content">
      <div class="card" style="background:#1877f2; color:#fff;">
        <b>세종기술 김시원 대리님</b><br>현재 ${drivingCount}대 운행 중입니다.
      </div>
      <div style="margin-top:20px; font-weight:bold;">품질부 차량 현황</div>
      ${S.vehicles.map(v => {
        const out = getActiveDrive(v.id);
        return `<div class="card" style="margin-top:10px;">
          <span class="badge" style="background:${out?'#fff0f0':'#e7f3ff'}; color:${out?'#ff4d4f':'#1877f2'}">${out?'운행중':'대기중'}</span>
          <div>${v.name} (${v.plate})</div>
        </div>`;
      }).join("")}
    </div>`;
}

function renderDrives() {
  return `<div class="header"><h1>주행 기록</h1><button class="btn-add" onclick="set({sheet:'drive'})">+ 출발</button></div>
          <div class="content">${S.drives.map(d => `<div class="card">
            <b>${S.vehicles.find(v=>v.id===d.vehicleId)?.name}</b><br>${d.from} → ${d.to}
            ${!d.arriveTime ? `<button class="btn-save" onclick="set({sheet:'arrive', sheetId:'${d.id}'})">복귀 입력</button>` : `<div style="color:#1877f2; font-size:12px; margin-top:5px;">✅ 완료</div>`}
          </div>`).join("")}</div>`;
}

function renderReport() {
  return `<div class="header"><h1>기록부</h1><button class="btn-add" onclick="window.print()">인쇄</button></div>
          <div class="content"><table><tr><th>차량</th><th>운전자</th><th>구간</th><th>거리</th></tr>
          ${S.drives.map(d => `<tr><td>${S.vehicles.find(v=>v.id===d.vehicleId)?.name}</td><td>${d.driver}</td><td>${d.from}~${d.to}</td><td>${d.arriveOdo||'-'}</td></tr>`).join("")}
          </table></div>`;
}

function renderVehs() {
  return `<div class="header"><h1>차량 관리</h1><button class="btn-add" onclick="set({sheet:'veh'})">+ 등록</button></div>
          <div class="content">${S.vehicles.map(v => `<div class="card"><b>${v.name}</b> (${v.plate})</div>`).join("")}</div>`;
}

function renderSheetBody() {
  if (S.sheet === 'drive') return `
    <h2>출발 등록</h2>
    <div id="drive_warn" class="warning-box" style="display:none"></div>
    <div class="field"><label>차량</label><select id="f_vid" onchange="window.checkVehicle(this.value)"><option value="">선택하세요</option>${S.vehicles.map(v=>`<option value="${v.id}">${v.name}</option>`).join("")}</select></div>
    <div class="field"><label>운전자</label><input id="f_driver" value="김시원"></div>
    <div class="field"><label>출발 거리(km)</label><input type="number" id="f_odo"></div>
    <div class="field"><label>목적지</label><input id="f_to"></div>
    <div class="field"><label>시간</label><input type="datetime-local" id="f_time" value="${nowLocal()}"></div>
    <button class="btn-save" id="btn_drive_submit" onclick="window.saveDrive()">등록</button>`;
  
  if (S.sheet === 'arrive') return `
    <h2>복귀 등록</h2>
    <div class="field"><label>거리(km)</label><input type="number" id="f_arrive_odo"></div>
    <div class="field"><label>시간</label><input type="datetime-local" id="f_arrive_time" value="${nowLocal()}"></div>
    <button class="btn-save" onclick="window.saveArrive()">완료</button>`;
  
  if (S.sheet === 'veh') return `
    <h2>차량 등록</h2>
    <div class="field"><label>차량명</label><input id="f_vname"></div>
    <div class="field"><label>번호판</label><input id="f_vplate"></div>
    <button class="btn-save" onclick="window.saveVeh()">등록</button>`;
}

// ── 6. 전역 함수 (버튼 클릭용) ──
window.changeTab = (t) => set({ tab: t });
window.checkVehicle = (vid) => {
  const active = getActiveDrive(vid);
  const warn = document.getElementById('drive_warn');
  const btn = document.getElementById('btn_drive_submit');
  const odo = document.getElementById('f_odo');
  
  if (active) { warn.innerText = "⚠️ 운행 중인 차량입니다."; warn.style.display = "block"; btn.disabled = true; }
  else { warn.style.display = "none"; btn.disabled = false; }
  
  odo.value = getPrevOdometer(vid);
};

window.saveDrive = async () => {
  const vid = document.getElementById('f_vid').value;
  if (!vid) return;
  await addDoc(collection(db, "drives"), {
    vehicleId: vid, driver: document.getElementById('f_driver').value,
    departOdo: Number(document.getElementById('f_odo').value),
    from: "본사", to: document.getElementById('f_to').value,
    departTime: document.getElementById('f_time').value,
    arriveTime: "", createdAt: Date.now()
  });
  set({ sheet: null });
  loadData();
};

window.saveArrive = async () => {
  const odo = document.getElementById('f_arrive_odo').value;
  await updateDoc(doc(db, "drives", S.sheetId), {
    arriveTime: document.getElementById('f_arrive_time').value,
    arriveOdo: Number(odo)
  });
  set({ sheet: null });
  loadData();
};

window.saveVeh = async () => {
  await addDoc(collection(db, "vehicles"), {
    name: document.getElementById('f_vname').value,
    plate: document.getElementById('f_vplate').value,
    createdAt: Date.now()
  });
  set({ sheet: null });
  loadData();
};

// ── 7. 초기 실행 ──
window.onload = () => {
  loadData();
};
</script>
</body>
</html>
